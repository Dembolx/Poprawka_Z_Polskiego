<!doctype html>
<html lang="pl">
<head>

  <title>Wojna i Okupacja · Polski</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#0e0c08;--ink:#f0ead8;--ink2:#a89f88;--gold:#c9a84c;--gold2:#e8c96a;--coral:#c84b2f;--teal:#2a7d5f;--blue:#2458a0;--amber:#b87020}
    body{background:var(--bg);color:var(--ink);font-family:"DM Sans",sans-serif;min-height:100vh;padding:0 0 6rem}
    body::before{content:"";position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.05'/%3E%3C/svg%3E");opacity:0.35;pointer-events:none;z-index:0}
    header{position:relative;z-index:1;text-align:center;padding:3rem 2rem 0}
    .back-btn{display:inline-flex;align-items:center;gap:.4rem;font-size:.7rem;letter-spacing:.15em;text-transform:uppercase;color:var(--ink2);text-decoration:none;border:1px solid rgba(255,255,255,.1);padding:.35rem .9rem;border-radius:100px;transition:all .2s;margin-bottom:1.5rem}
    .back-btn:hover{border-color:var(--gold);color:var(--gold)}
    .eyebrow{font-size:.72rem;font-weight:500;letter-spacing:.22em;text-transform:uppercase;color:var(--gold);margin-bottom:.7rem}
    h1{font-family:"Playfair Display",serif;font-size:clamp(2rem,6vw,4rem);font-weight:900;line-height:1;color:var(--ink);letter-spacing:-.02em}
    h1 span{color:var(--gold2);font-style:italic}
    .sub{margin-top:.6rem;font-size:.9rem;color:var(--ink2)}
    .hdiv{width:60px;height:1px;background:var(--gold);margin:1.2rem auto 0;opacity:.5}
    .page{position:relative;z-index:1;max-width:980px;margin:0 auto;padding:2.5rem 1.5rem}
    @keyframes fu{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
    .nav-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:.7rem;margin-bottom:3rem}
    .nav-btn{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:8px;padding:.7rem 1rem;cursor:pointer;text-align:left;transition:all .18s;font-family:"DM Sans",sans-serif;color:var(--ink2);font-size:.72rem;animation:fu .5s ease both}
    .nav-btn:hover{border-color:rgba(255,255,255,.2);color:var(--ink);background:rgba(255,255,255,.06)}
    .nav-btn .nb{font-size:.6rem;color:var(--gold);font-weight:600;letter-spacing:.1em;text-transform:uppercase;margin-bottom:.2rem}
    .nav-btn .nt{font-size:.8rem;color:var(--ink);font-weight:500}
    .section{border:1px solid rgba(255,255,255,.09);border-radius:14px;overflow:hidden;margin-bottom:2rem;animation:fu .5s ease both}
    .section-head{padding:1.4rem 1.8rem;cursor:pointer;display:flex;align-items:center;gap:1rem;background:rgba(255,255,255,.03);transition:background .2s}
    .section-head:hover{background:rgba(255,255,255,.055)}
    .sh-num{font-family:"Playfair Display",serif;font-size:1.6rem;font-weight:900;color:var(--gold);opacity:.35;width:2.2rem;flex-shrink:0}
    .sh-info{flex:1}
    .sh-title{font-family:"Playfair Display",serif;font-size:1.1rem;font-weight:700;color:var(--ink)}
    .sh-sub{font-size:.7rem;color:var(--ink2);margin-top:.2rem}
    .sh-arrow{color:var(--ink2);font-size:.9rem;transition:transform .25s;flex-shrink:0}
    .section.open .sh-arrow{transform:rotate(90deg)}
    .section-body{display:none;padding:1.6rem 1.8rem;border-top:1px solid rgba(255,255,255,.07)}
    .section.open .section-body{display:block}
    .note-title{font-size:.6rem;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);margin-bottom:1rem;font-weight:600}
    .note-block{background:rgba(255,255,255,.025);border-left:3px solid var(--gold);border-radius:0 8px 8px 0;padding:1rem 1.2rem;margin-bottom:1rem;font-size:.88rem;line-height:1.75;color:var(--ink2)}
    .note-block strong{color:var(--ink);font-weight:600}
    .note-block em{color:var(--gold);font-style:italic}
    .kw-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:.6rem;margin-bottom:1rem}
    .kw{background:rgba(201,168,76,.07);border:1px solid rgba(201,168,76,.2);border-radius:8px;padding:.6rem .9rem}
    .kw-term{font-size:.78rem;font-weight:600;color:var(--gold2);margin-bottom:.15rem}
    .kw-def{font-size:.7rem;color:var(--ink2);line-height:1.5}
    .timeline{margin-bottom:1rem}
    .tl-item{display:flex;gap:1rem;padding:.5rem 0;border-bottom:1px solid rgba(255,255,255,.05)}
    .tl-item:last-child{border-bottom:none}
    .tl-year{font-family:"Playfair Display",serif;font-size:.85rem;font-weight:700;color:var(--gold);width:3.5rem;flex-shrink:0;padding-top:.1rem}
    .tl-text{font-size:.8rem;color:var(--ink2);line-height:1.6}
    .tl-text strong{color:var(--ink)}
    .cmp{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1rem}
    @media(max-width:560px){.cmp{grid-template-columns:1fr}}
    .cmp-col{background:rgba(255,255,255,.025);border-radius:8px;padding:1rem 1.1rem}
    .cmp-head{font-size:.65rem;letter-spacing:.15em;text-transform:uppercase;font-weight:700;margin-bottom:.7rem;padding-bottom:.4rem;border-bottom:1px solid rgba(255,255,255,.08)}
    .cmp-row{font-size:.75rem;color:var(--ink2);padding:.3rem 0;border-bottom:1px solid rgba(255,255,255,.04);line-height:1.5}
    .cmp-row:last-child{border-bottom:none}
    .cmp-row strong{color:var(--ink);font-size:.72rem}
    .poem{background:rgba(255,255,255,.025);border:1px solid rgba(255,255,255,.07);border-radius:8px;padding:1.2rem 1.4rem;font-family:"Playfair Display",serif;font-style:italic;font-size:.9rem;line-height:2;color:var(--ink);margin-bottom:1rem;white-space:pre-line}
    .poem-source{font-family:"DM Sans",sans-serif;font-style:normal;font-size:.68rem;color:var(--ink2);margin-top:.5rem;text-align:right}
    .author-card{display:grid;grid-template-columns:auto 1fr;gap:1.2rem;background:rgba(255,255,255,.025);border-radius:10px;padding:1.2rem;margin-bottom:1rem;align-items:start}
    .author-avatar{width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--amber));display:flex;align-items:center;justify-content:center;font-family:"Playfair Display",serif;font-size:1.3rem;font-weight:900;color:#0e0c08;flex-shrink:0}
    .author-name{font-family:"Playfair Display",serif;font-size:1rem;font-weight:700;color:var(--ink);margin-bottom:.15rem}
    .author-dates{font-size:.7rem;color:var(--gold);margin-bottom:.4rem}
    .author-bio{font-size:.78rem;color:var(--ink2);line-height:1.6}
    .quiz-area{margin-top:1.5rem}
    .quiz-title{font-size:.6rem;letter-spacing:.2em;text-transform:uppercase;color:var(--coral);margin-bottom:1rem;font-weight:600}
    .q-card{background:rgba(200,75,47,.05);border:1px solid rgba(200,75,47,.15);border-radius:10px;padding:1.2rem;margin-bottom:.8rem}
    .q-text{font-size:.88rem;font-weight:500;color:var(--ink);margin-bottom:.9rem;line-height:1.6}
    .q-opts{display:flex;flex-direction:column;gap:.45rem}
    .q-opt{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:7px;padding:.55rem .9rem;font-size:.8rem;color:var(--ink2);cursor:pointer;transition:all .15s;font-family:"DM Sans",sans-serif;text-align:left}
    .q-opt:hover:not(.disabled){border-color:rgba(255,255,255,.25);color:var(--ink)}
    .q-opt.correct{background:rgba(42,125,95,.2);border-color:#2a7d5f;color:#6acca8}
    .q-opt.wrong{background:rgba(200,75,47,.15);border-color:var(--coral);color:#f09080}
    .q-opt.disabled{cursor:default}
    .q-feedback{font-size:.75rem;color:var(--ink2);margin-top:.6rem;padding:.5rem .7rem;background:rgba(255,255,255,.03);border-radius:6px;display:none;line-height:1.5}
    .q-feedback.show{display:block}
    .q-feedback.ok{color:#6acca8}
    .q-feedback.bad{color:#f09080}
    .quiz-score{background:rgba(201,168,76,.08);border:1px solid rgba(201,168,76,.2);border-radius:8px;padding:.8rem 1rem;font-size:.82rem;color:var(--gold);text-align:center;display:none;margin-top:.8rem}
    .quiz-score.show{display:block}
    .quiz-controls{display:flex;gap:.6rem;margin-top:.8rem}
    .q-btn{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.12);color:var(--ink2);font-family:"DM Sans",sans-serif;font-size:.72rem;padding:.45rem 1rem;border-radius:100px;cursor:pointer;transition:all .15s}
    .q-btn:hover{border-color:var(--gold);color:var(--gold)}
    .q-btn.primary{background:rgba(201,168,76,.12);border-color:var(--gold);color:var(--gold)}
    .op-bar{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:1.2rem 1.6rem;margin-bottom:2rem;animation:fu .4s ease}
    .op-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:.6rem}
    .op-label{font-family:"Playfair Display",serif;font-size:.95rem;font-weight:700}
    .op-pct{font-size:1.5rem;font-weight:900;font-family:"Playfair Display",serif;color:var(--gold)}
    .pb{height:6px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden}
    .pf{height:100%;background:linear-gradient(90deg,var(--teal),var(--gold));border-radius:3px;transition:width .8s ease}
    @media(max-width:640px){.page{padding:2rem 1rem}.section-body{padding:1.2rem 1rem}.nav-grid{grid-template-columns:repeat(2,1fr)}}
  </style>
</head>

</div>
<script>
const TOPICS=[
{id:"ramy",num:"01",emoji:"📅",title:"Ramy czasowe II wojny",sub:"1939–1945 · Chronologia · Skutki",
note:`<div class="note-title">📝 Notatka</div>
<div class="note-block"><strong>II wojna światowa (1939–1945)</strong> — największy konflikt zbrojny w historii. Pochłonęła ok. <strong>70–85 milionów ofiar</strong>, w tym 6 milionów obywateli polskich.</div>
<div class="timeline">
<div class="tl-item"><div class="tl-year">1939</div><div class="tl-text"><strong>1 września</strong> — napad Niemiec na Polskę; <strong>17 września</strong> — wkroczenie ZSRR; pakt Ribbentrop–Mołotow (23 VIII)</div></div>
<div class="tl-item"><div class="tl-year">1940</div><div class="tl-text">Blitzkrieg na Francję; Katyń (marzec–maj)</div></div>
<div class="tl-item"><div class="tl-year">1941</div><div class="tl-text"><strong>22 czerwca</strong> — Operacja Barbarossa; Pearl Harbor — USA w wojnie</div></div>
<div class="tl-item"><div class="tl-year">1942</div><div class="tl-text">Konferencja w Wannsee — plan eksterminacji Żydów; zwrot pod Stalingradem</div></div>
<div class="tl-item"><div class="tl-year">1943</div><div class="tl-text"><strong>Powstanie w getcie warszawskim</strong> (kwiecień–maj); klęska pod Stalingradem</div></div>
<div class="tl-item"><div class="tl-year">1944</div><div class="tl-text"><strong>Powstanie Warszawskie</strong> (1 VIII – 2 X); lądowanie w Normandii (6 VI)</div></div>
<div class="tl-item"><div class="tl-year">1945</div><div class="tl-text"><strong>8 maja</strong> — kapitulacja Niemiec (VE Day); <strong>2 września</strong> — Japonia (VJ Day)</div></div>
</div>
<div class="kw-grid">
<div class="kw"><div class="kw-term">Blitzkrieg</div><div class="kw-def">Błyskawiczna taktyka pancerna z lotnictwem</div></div>
<div class="kw"><div class="kw-term">Pakt Ribbentrop–Mołotow</div><div class="kw-def">Pakt nieagresji ZSRR–Rzesza z tajnym protokołem o podziale Europy</div></div>
<div class="kw"><div class="kw-term">Katyń</div><div class="kw-def">Mord NKWD na ok. 22 000 polskich oficerów (1940)</div></div>
<div class="kw"><div class="kw-term">Wannsee</div><div class="kw-def">Konferencja 1942 r. planująca „ostateczne rozwiązanie"</div></div>
</div>`,
quiz:[
{q:"Kiedy Niemcy napadły na Polskę?",opts:["1 września 1939","17 września 1939","3 września 1939","23 sierpnia 1939"],ans:0,fb:"1 września 1939 – tego dnia Niemcy zaatakowały Polskę. 17 września wkroczyła Armia Czerwona."},
{q:"Czym był pakt Ribbentrop–Mołotow?",opts:["Sojusz wojskowy","Pakt nieagresji z tajnym protokołem o podziale Europy","Traktat pokojowy","Umowa handlowa"],ans:1,fb:"Pakt z 23 VIII 1939 r. zawierał tajny protokół dzielący Europę Wschodnią między Rzeszę a ZSRR."},
{q:"Ile ofiar pochłonęła II wojna?",opts:["Ok. 15 mln","Ok. 40 mln","Ok. 70–85 mln","Ok. 5 mln"],ans:2,fb:"Szacuje się ok. 70–85 milionów ofiar."},
{q:"Kiedy skapitulowały Niemcy?",opts:["2 września 1945","8 maja 1945","1 maja 1945","9 maja 1944"],ans:1,fb:"8 maja 1945 (VE Day) – bezwarunkowa kapitulacja III Rzeszy."},
{q:"Co wydarzyło się w Katyniu?",opts:["Bitwa pancerna","Mord NKWD na polskich oficerach","Powstanie więźniów","Konferencja aliancka"],ans:1,fb:"Wiosną 1940 r. NKWD zamordowało ok. 22 000 polskich oficerów i elit."}
]},
{id:"fasz",num:"02",emoji:"⚖️",title:"Faszyzm vs Nazizm",sub:"Ideologie · Podobieństwa · Różnice",
note:`<div class="note-title">📝 Notatka</div>
<div class="cmp">
<div class="cmp-col">
<div class="cmp-head" style="color:#e8a040">🟠 Faszyzm (Włochy)</div>
<div class="cmp-row"><strong>Twórca:</strong> Benito Mussolini</div>
<div class="cmp-row"><strong>Centrum:</strong> Kult państwa jako wspólnoty organicznej</div>
<div class="cmp-row"><strong>Rasa:</strong> Początkowo nierasistowski</div>
<div class="cmp-row"><strong>Gospodarka:</strong> Korporacjonizm — współpraca państwa, kapitału i pracy</div>
<div class="cmp-row"><strong>Slogan:</strong> „Wszystko w państwie, nic poza państwem"</div>
</div>
<div class="cmp-col">
<div class="cmp-head" style="color:#c84b2f">🔴 Nazizm (Niemcy)</div>
<div class="cmp-row"><strong>Twórca:</strong> Adolf Hitler (NSDAP)</div>
<div class="cmp-row"><strong>Centrum:</strong> Kult rasy aryjskiej</div>
<div class="cmp-row"><strong>Rasa:</strong> Rasizm i antysemityzm jako fundament</div>
<div class="cmp-row"><strong>Gospodarka:</strong> Militaryzacja, Lebensraum</div>
<div class="cmp-row"><strong>Slogan:</strong> „Jeden naród, jedna rzesza, jeden wódz"</div>
</div>
</div>
<div class="note-block"><strong>Cechy wspólne:</strong> totalitaryzm, kult wodza, jednopartyjność, propaganda, militaryzm, antymarksizm.<br><br><strong>Kluczowa różnica:</strong> Nazizm jest <em>rasistowski i eksterminacyjny</em>. Faszyzm skupia się na państwie, nie eksterminacji etnicznej.</div>`,
quiz:[
{q:"Kto był twórcą faszyzmu?",opts:["Adolf Hitler","Benito Mussolini","Francisco Franco","Stalin"],ans:1,fb:"Benito Mussolini stworzył ruch faszystowski we Włoszech po I wojnie."},
{q:"Co wyróżnia nazizm spośród faszyzmów?",opts:["Kult wodza","Antymarksizm","Rasizm i antysemityzm jako centrum ideologii","Militaryzm"],ans:2,fb:"Nazizm opierał się na pseudonaukowym rasizmie – faszyzm włoski nie był pierwotnie rasistowski."},
{q:"Co oznacza Lebensraum?",opts:["Przestrzeń życiowa dla rasy aryjskiej","Obóz pracy","Prawo wojenne","Kult wodza"],ans:0,fb:"Lebensraum — nazistowska idea podboju terenów wschodnich dla ekspansji Niemiec."},
{q:"Czym był korporacjonizm faszystowski?",opts:["Nacjonalizacja firm","Współpraca państwa, kapitału i pracy pod nadzorem partii","Wolny rynek","System sowietów"],ans:1,fb:"Korporacjonizm = harmonia między pracą a kapitałem pod kontrolą autorytarnego państwa."},
{q:"Jaką cechę wspólną mają oba systemy?",opts:["Popierają demokrację","Oba opierają się na rasizmie","Oba są totalitarne i antymarksistowskie","Oba powstały w Niemczech"],ans:2,fb:"Totalitaryzm, kult wodza i wrogość wobec marksizmu to cechy wspólne."}
]},
{id:"holokaust",num:"03",emoji:"✡️",title:"Holokaust",sub:"Shoah · Obozy zagłady · 6 milionów",
note:`<div class="note-title">📝 Notatka</div>
<div class="note-block"><strong>Holokaust / Shoah</strong> — systematyczna eksterminacja ok. <strong>6 milionów Żydów europejskich</strong> w latach 1941–1945 przez III Rzeszę.</div>
<div class="timeline">
<div class="tl-item"><div class="tl-year">1933</div><div class="tl-text">Hitler u władzy; antysemickie ustawy, bojkot sklepów żydowskich</div></div>
<div class="tl-item"><div class="tl-year">1935</div><div class="tl-text"><strong>Ustawy norymberskie</strong> — Żydzi pozbawieni obywatelstwa</div></div>
<div class="tl-item"><div class="tl-year">1938</div><div class="tl-text"><strong>Noc Kryształowa</strong> (9–10 XI) — pogromy, podpalanie synagog</div></div>
<div class="tl-item"><div class="tl-year">1942</div><div class="tl-text">Wannsee; obozy zagłady: Auschwitz-Birkenau, Treblinka, Sobibór, Bełżec, Majdanek</div></div>
<div class="tl-item"><div class="tl-year">1945</div><div class="tl-text">Wyzwolenie obozów; procesy norymberskie (1945–46)</div></div>
</div>
<div class="kw-grid">
<div class="kw"><div class="kw-term">Getto</div><div class="kw-def">Odizolowana dzielnica przymusowa; warszawskie — ok. 400 tys. ludzi</div></div>
<div class="kw"><div class="kw-term">Selekcja</div><div class="kw-def">Podział na rampie: zdolni do pracy vs. natychmiastowa śmierć</div></div>
<div class="kw"><div class="kw-term">Zyklon B</div><div class="kw-def">Pestycyd użyty jako gaz do masowego mordowania w komorach</div></div>
<div class="kw"><div class="kw-term">Żegota</div><div class="kw-def">Polska podziemna organizacja pomocy Żydom — jedyna w Europie</div></div>
<div class="kw"><div class="kw-term">Einsatzgruppen</div><div class="kw-def">Mobilne jednostki SS dokonujące masowych rozstrzeliwań</div></div>
<div class="kw"><div class="kw-term">Sonderkommando</div><div class="kw-def">Więźniowie zmuszani do obsługi komór i krematoriów</div></div>
</div>`,
quiz:[
{q:"Ile Żydów zginęło w Holokauście?",opts:["Ok. 1 milion","Ok. 3 miliony","Ok. 6 milionów","Ok. 10 milionów"],ans:2,fb:"Szacuje się, że zginęło ok. 6 milionów Żydów — 2/3 Żydów europejskich."},
{q:"Co to była Noc Kryształowa?",opts:["Konferencja w Wannsee","Pogromy antysemickie 9–10 XI 1938","Wyzwolenie Auschwitz","Ucieczka z getta"],ans:1,fb:"Noc Kryształowa — zorganizowany pogrom: podpalenie synagog, zniszczenie sklepów, aresztowania."},
{q:"Gdzie odbyła się konferencja planująca eksterminację Żydów?",opts:["Norymberga","Berlin","Wannsee","Monachium"],ans:2,fb:"Konferencja w Wannsee (20 I 1942) — naziści zaplanowali systematyczną eksterminację Żydów."},
{q:"Czym była Żegota?",opts:["Organizacja SS","Polska podziemna organizacja pomocy Żydom","Obóz koncentracyjny","Żydowski ruch oporu"],ans:1,fb:"Żegota — jedyna w Europie rządowa organizacja podziemna pomagająca Żydom."},
{q:"Co to był Zyklon B?",opts:["Broń biologiczna","Pestycyd użyty jako gaz do mordowania","Środek szpitalny","Kod Enigmy"],ans:1,fb:"Zyklon B — środek owadobójczy zastosowany w komorach gazowych Auschwitz."}
]},

{id:"pokolenie",num:"07",emoji:"⚔️",title:"Pokolenie / Z głową na karabinie / Elegia",sub:"Analiza wierszy Baczyńskiego",
note:`<div class="note-title">📝 Pokolenie (1941)</div>
<div class="poem">Nas nauczono. Nie ma litości.
Chodziliśmy twardzi jak kamień.
Śmierci się nie boimy — miłości
nam nie zostało już nawet wspomnienie.

Wyuczeni, że śmierć jest piękna —
my, co nigdy nie byliśmy młodzi —
niosąc w sobie pogodę okrutną,
przyszliśmy po was sądzić
i ginąć.
<div class="poem-source">K.K. Baczyński, fragment</div></div>
<div class="note-block"><strong>Podmiot:</strong> Zbiorowy — „my" (całe pokolenie).<br><strong>Temat:</strong> Dramat pokolenia — skradziona młodość.<br><strong>„Nigdy nie byliśmy młodzi"</strong> — kluczowa fraza: wojna odebrała im normalność.<br><strong>Ton:</strong> Gorzki, katastroficzny, pozbawiony nadziei.</div>

<div class="note-title">📝 Z głową na karabinie (1943)</div>
<div class="note-block"><strong>Temat:</strong> Egzystencja żołnierza — chwile miłości zagrożone śmiercią.<br><strong>Kontrast:</strong> Miłość i czułość vs. karabin i śmierć.<br><strong>Tytuł:</strong> Zamiast poduszki — karabin. Symbol brutalnej codzienności.<br><strong>Motyw snu:</strong> Chwilowy azyl od koszmaru.</div>

<div class="note-title">📝 Elegia o chłopcu polskim (1944)</div>
<div class="poem">Odszedłeś, syneczku, w tę czarną godzinę
jak strumyk lśniący — gwiazdę weź na drogę.
<div class="poem-source">K.K. Baczyński, fragment</div></div>
<div class="note-block"><strong>Podmiot:</strong> Matka żegnająca syna — symbol Polski.<br><strong>Elegia:</strong> Utwór żałobny; pożegnanie zakładające śmierć syna.<br><strong>Zdrobnienie „syneczek":</strong> Czułość vs. okrucieństwo losu.<br><strong>Kontekst:</strong> Baczyński pisał wiedząc, że idzie walczyć.</div>`,
quiz:[
{q:"Kto mówi w wierszu Pokolenie?",opts:["Jeden żołnierz","Baczyński osobiście","Zbiorowy podmiot — całe pokolenie","Matka"],ans:2,fb:"'My' — podmiot zbiorowy. Baczyński wypowiada się w imieniu całego pokolenia."},
{q:"Co symbolizuje głowa na karabinie?",opts:["Odwaga","Brutalną codzienność — karabin zamiast poduszki","Symbol miłości","Modlitwa"],ans:1,fb:"Zamiast poduszki żołnierz kładzie głowę na karabinie — metafora wojennej brutalności."},
{q:"Kto jest podmiotem w Elegii o chłopcu polskim?",opts:["Sam Baczyński","Syn","Matka żegnająca syna","Żołnierz AK"],ans:2,fb:"Podmiotem jest matka — symbol Polski opłakującej swoje dzieci."},
{q:"Co oznacza nigdy nie byliśmy młodzi?",opts:["Żołnierze byli starzy","Wojna zabrała im normalną młodość","Mówią o poprzednim pokoleniu","Metafora religijna"],ans:1,fb:"Kluczowa fraza: dramat pokolenia wojennego — brak normalnego dzieciństwa i młodości."},
{q:"Czym jest elegia jako gatunek?",opts:["Hymn pochwalny","Satyra","Utwór żałobny, pożegnalny","Epopeja"],ans:2,fb:"Elegia to liryczny utwór żałobny. Tu — pożegnanie z góry zakładające śmierć."}

{id:"campo",num:"09",emoji:"🌹",title:"Campo di Fiori",sub:"Miłosz 1943 · Analiza · Obojętność",
note:`<div class="note-title">📝 Analiza</div>
<div class="note-block">Wiersz napisany w <strong>1943 roku</strong>, gdy za murem płonęło getto warszawskie. Miłosz obserwował karuzele i bawiący się tłum.</div>
<div class="poem">W Rzymie na Campo di Fiori
kosze oliwek i cytryn,
bruk opryskany winem
i odłamkami kwiatów.

Tu na tym właśnie placu
spalono Giordana Bruna,
kat płomień stosu zapalił
w kole ciekawej gawiedzi.

A ledwo płomień przygasał,
znów pełne były tawerny,
kosze oliwek i cytryn
nieśli przekupnie na głowach.
<div class="poem-source">Czesław Miłosz, fragment (Warszawa 1943)</div></div>
<div class="kw-grid">
<div class="kw"><div class="kw-term">Campo di Fiori</div><div class="kw-def">Plac w Rzymie — w 1600 r. spalono tu Giordana Bruna</div></div>
<div class="kw"><div class="kw-term">Paralela</div><div class="kw-def">Rzym 1600 (Bruno) ↔ Warszawa 1943 (getto) — ta sama obojętność</div></div>
<div class="kw"><div class="kw-term">Karuzela</div><div class="kw-def">Symbol skandalicznej obojętności — zabawa obok zagłady</div></div>
<div class="kw"><div class="kw-term">Samotność umierających</div><div class="kw-def">Ofiary giną w absolutnej samotności — nikt nie utrwali ich imion</div></div>
</div>

{id:"ocalony",num:"11",emoji:"🕊️",title:"Ocalony",sub:"Różewicz · Analiza wiersza",
note:`<div class="poem">Mam dwadzieścia cztery lata
ocalałem
prowadzony na rzeź

Oto są moje nauczyciele:
waga nocna las
i człowiek który strzela

Człowiek ten jest moim przyjacielem
i wrogiem zarazem

Szukam nauczyciela i mistrza
niech przywróci mi wzrok słuch i mowę
niech jeszcze raz nazwie rzeczy i pojęcia
niech oddzieli światło od ciemności

Mam dwadzieścia cztery lata
prowadzony na rzeź
<div class="poem-source">Tadeusz Różewicz, 1947</div></div>
<div class="kw-grid">
<div class="kw"><div class="kw-term">Podmiot liryczny</div><div class="kw-def">24-letni ocalały — symbol pokolenia. Przeżył, ale wewnętrznie martwy</div></div>
<div class="kw"><div class="kw-term">Paradoks tytułu</div><div class="kw-def">Ocalony i wciąż prowadzony na rzeź — śmierć duchowa trwa</div></div>
<div class="kw"><div class="kw-term">Kryzys wartości</div><div class="kw-def">Nie wie, co dobre, co złe; nauczyciel = ten który strzela</div></div>
<div class="kw"><div class="kw-term">Prośba o odbudowę</div><div class="kw-def">„Przywróć mi wzrok" — potrzeba nowego sensu i wartości</div></div>
<div class="kw"><div class="kw-term">Aluzja biblijna</div><div class="kw-def">„Oddziel światło od ciemności" = Rdz 1,4 — prośba o nowe stworzenie</div></div>
</div>
<div class="note-block"><strong>Główna myśl:</strong> Ocalenie fizyczne nie jest ocaleniem duchowym. Podmiot liryczny żyje biologicznie, ale moralnie i duchowo jest martwy.</div>`,

{q:"Co oznacza paradoks ocalałem / prowadzony na rzeź?",opts:["Jest żołnierzem","Ciało przeżyło, ale duchowa śmierć trwa","Nierozumienie rzeczywistości","Metafora podróży"],ans:1,fb:"Centralny paradoks: przeżycie fizyczne ≠ ocalenie duchowe."},
{q:"Czego szuka podmiot liryczny?",opts:["Zemsty","Kogoś, kto przywróci mu wartości i sens","Nowej ojczyzny","Miłości"],ans:1,fb:"'Szukam nauczyciela i mistrza' — prośba o odbudowanie świata wartości."},
{q:"Do czego nawiązuje oddziel światło od ciemności?",opts:["Do fizyki","Do Rdz 1,4 — aktu stworzenia","Do religii greckiej","Do Kanta"],ans:1,fb:"Aluzja do Biblii — akt stworzenia. Prośba o ponowne nadanie sensu."},

{id:"gaz",num:"12",emoji:"🚂",title:"Proszę państwa do gazu",sub:"Borowski · Auschwitz · Behawioryzm",
note:`<div class="note-title">📝 Notatka</div>
<div class="note-block"><strong>„Proszę państwa do gazu"</strong> — opowiadanie Borowskiego z tomu <em>Pożegnanie z Marią</em> (1948). Narrator: <strong>Tadek</strong> — więzień pracujący na rampie obozowej.</div>
<div class="kw-grid">
<div class="kw"><div class="kw-term">Narrator Tadek</div><div class="kw-def">Więzień uprzywilejowany pracujący przy selekcji — świadek i uczestnik zarazem</div></div>
<div class="kw"><div class="kw-term">Behawioryzm</div><div class="kw-def">Opis zachowań bez ocen moralnych — chłodna relacja. Groza przez brak emocji</div></div>
<div class="kw"><div class="kw-term">Relatywizm obozowy</div><div class="kw-def">Nie ma dobra i zła — jest tylko przetrwanie</div></div>
<div class="kw"><div class="kw-term">Dehumanizacja</div><div class="kw-def">Ofiary stają się bezimienne przedmioty; liczby, nie ludzie</div></div>
<div class="kw"><div class="kw-term">Człowiek z Auschwitz</div><div class="kw-def">Zdegradowany do instynktu przetrwania — gotowy na wszystko</div></div>
</div>
<div class="note-block"><strong>Przesłanie:</strong> Obóz zniszczył moralność wszystkich — i katów, i ofiar, i świadków. Borowski nie heroizuje ocalałych.<br><br><strong>Kontrowersja:</strong> Narrator jest <em>współuczestnikiem</em> systemu zagłady — to oskarżenie mechanizmu zmuszającego do wyboru: przeżyj kosztem innych lub zgiń.</div>`,

]},
{id:"borowski",num:"13",emoji:"🔦",title:"Tadeusz Borowski — charakterystyka",sub:"Auschwitz · Cynizm · Tragedia ocalałego",
note:`<div class="author-card">
<div class="author-avatar">TB</div>
<div>
<div class="author-name">Tadeusz Borowski</div>
<div class="author-dates">1922–1951 · prozaik, poeta</div>
<div class="author-bio">Więzień Auschwitz-Birkenau i Dachau. Przeżył wojnę, lecz popełnił samobójstwo 3 dni po urodzeniu córki, mając 28 lat. Jego opowiadania to oskarżenie systemu obozowego.</div>
</div>
</div>
<div class="kw-grid">
<div class="kw"><div class="kw-term">Autobiografizm</div><div class="kw-def">Sam był w Auschwitz — fikcja oparta na własnym doświadczeniu</div></div>
<div class="kw"><div class="kw-term">Antyheroes</div><div class="kw-def">Narrator nie jest moralnym bohaterem — uwikłany w system</div></div>
<div class="kw"><div class="kw-term">Cynizm obozowy</div><div class="kw-def">Czarny humor jako mechanizm obronny ocalałego; zero sentymentalizmu</div></div>
<div class="kw"><div class="kw-term">Dehumanizacja</div><div class="kw-def">Ofiary jako liczby i rzeczy — ludzkie ciało towarem</div></div>
<div class="kw"><div class="kw-term">Oskarżenie systemu</div><div class="kw-def">Obóz niszczy moralność wszystkich — katów, ofiar i świadków</div></div>
</div>
<div class="note-block"><strong>Dzieła:</strong> <em>Pożegnanie z Marią</em> (1948), <em>Kamienny świat</em> (1948).<br><br>Po wojnie zaangażował się w komunizm. Rozczarowanie stalinizmem przyczyniło się do jego samobójstwa.</div>`,

{q:"Gdzie był więziony Borowski?",opts:["Treblinka i Sobibór","Auschwitz-Birkenau i Dachau","Majdanek i Bełżec","Stutthof"],ans:1,fb:"Borowski trafił do Auschwitz-Birkenau, potem Dachau."},
{q:"Kiedy i jak Borowski zginął?",opts:["Podczas Powstania","W obozie","Popełnił samobójstwo w 1951 r.","Zginął w 1945"],ans:2,fb:"Borowski popełnił samobójstwo 3 lipca 1951 roku — 3 dni po urodzeniu córki. Miał 28 lat."},
{q:"Co jest główną cechą narracji Borowskiego?",opts:["Sentymentalizm","Chłodny cyniczny behawioryzm","Heroizacja żołnierzy","Religijność"],ans:1,fb:"Borowski pisze chłodno, rzeczowo, bez moralizowania."},
{q:"Dlaczego narrator nie jest bohaterem moralnym?",opts:["Jest tchórzem","Jest Niemcem","Uczestniczy w systemie obozowym — pracuje na rampie","Nienawidzi Polaków"],ans:2,fb:"Borowski pokazuje, jak obóz kompromituje moralnie nawet ofiary."},
{q:"W co Borowski wierzył po wojnie?",opts:["Powrót II RP","Demokracja zachodnia","Komunizm","Religię katolicką"],ans:2,fb:"Po wojnie zaangażował się w komunizm. Rozczarowanie stalinizmem przyczyniło się do samobójstwa."}
]},
{id:"herling",num:"14",emoji:"❄️",title:"Herling-Grudziński — charakterystyka",sub:"Gułag · Świadek · Emigracja · Nobel kandydat",
note:`<div class="author-card">
<div class="author-avatar">GH</div>
<div>
<div class="author-name">Gustaw Herling-Grudziński</div>
<div class="author-dates">1919–2000 · prozaik, eseista</div>
<div class="author-bio">Aresztowany przez NKWD (1940). Dwa lata w łagrze Jercewo. Po zwolnieniu — armia Andersa, Monte Cassino. Emigracja: Londyn, Neapol. Redaktor paryskiej Kultury.</div>
</div>
</div>
<div class="kw-grid">
<div class="kw"><div class="kw-term">Świadectwo</div><div class="kw-def">Obowiązek informowania świata o zbrodniach sowieckich</div></div>
<div class="kw"><div class="kw-term">Eseistyka</div><div class="kw-def">Łączy narrację osobistą z analizą filozoficzną i moralną</div></div>
<div class="kw"><div class="kw-term">Godność człowieka</div><div class="kw-def">Jak zachować człowieczeństwo w systemie totalitarnym?</div></div>

</div>
<div class="note-block"><strong>Inny Świat (1951)</strong> — napisany po angielsku w Londynie. Opis łagru z perspektywy moralnej. Przetłumaczony na wiele języków.<br><br><strong>Dziennik pisany nocą</strong> — wydawany latami w paryskiej Kulturze.</div>`,

{q:"Jak się nazywa główne dzieło Herlinga?",opts:["Pożegnanie z Marią","Ocalenie","Inny Świat","Zniewolony umysł"],ans:2,fb:"Inny Świat (1951) — opis łagru sowieckiego."},
{q:"Co robił Herling po zwolnieniu z łagru?",opts:["Wrócił do Warszawy","Służył w armii Andersa, potem emigrował","Trafił do Londynu wprost","Wstąpił do partii komunistycznej"],ans:1,fb:"Po zwolnieniu dołączył do armii Andersa — Bliski Wschód, Włochy (Monte Cassino)."},

]},
{id:"inny",num:"15",emoji:"🌨️",title:"Inny Świat",sub:"Herling-Grudziński · Analiza · Gułag",
note:`<div class="note-title">📝 Notatka</div>
<div class="note-block"><strong>„Inny Świat. Zapiski sowieckie"</strong> — 1951, Londyn (po angielsku). Opis dwóch lat w łagrze Jercewo koło Archangielska.</div>
<div class="kw-grid">
<div class="kw"><div class="kw-term">Gatunek</div><div class="kw-def">Hybryda — pamiętnik + reportaż literacki + esej egzystencjalny</div></div>
<div class="kw"><div class="kw-term">Narracja 1. os.</div><div class="kw-def">Autor = narrator = bohater. Subiektywne świadectwo</div></div>
<div class="kw"><div class="kw-term">Realia łagru</div><div class="kw-def">Głód, zimno, normy pracy, donosicielstwo, szpital — walka o przeżycie</div></div>
<div class="kw"><div class="kw-term">Nawiązanie do Dostojewskiego</div><div class="kw-def">Wspomnienia z domu umarłych — rosyjska tradycja literatury więziennej</div></div>
<div class="kw"><div class="kw-term">Godność vs przetrwanie</div><div class="kw-def">Wybór: stracić godność dla przeżycia lub zachować człowieczeństwo ryzykując śmierć</div></div>
</div>
<div class="note-block"><strong>Porównanie Borowski vs Herling:</strong><br>
Borowski = cynizm, brak nadziei, człowiek całkowicie zdegradowany.<br>
Herling = mimo wszystko możliwa jest godność i duchowy opór.<br>
Dwie odpowiedzi na pytanie: jak przeżyć totalitaryzm?<br><br>
W Polsce ukazał się dopiero w <strong>1989 r.</strong> (koniec cenzury komunistycznej).</div>`,

{q:"Czym różni się wizja człowieka u Herlinga od Borowskiego?",opts:["Borowski o wojnie, Herling o pokoju","Borowski = cynizm; Herling = możliwy duchowy opór","Obaj piszą tak samo","Borowski o gułagu"],ans:1,fb:"Borowski nie daje nadziei. Herling wierzy, że można zachować godność mimo zniewolenia."},
{q:"Kiedy Inny Świat ukazał się w Polsce?",opts:["1951","1960","1989","1945"],ans:2,fb:"W Polsce Inny Świat był zakazany przez cenzurę komunistyczną. Ukazał się oficjalnie w 1989 r."}
]}

const quizState={};
function shuffleArr(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}
function getP(){try{return JSON.parse(localStorage.getItem("polski_war_p")||"{}")}catch{return{}}}
function setP(d){try{localStorage.setItem("polski_war_p",JSON.stringify(d))}catch{}}
function saveResult(id,pct){const p=getP();if(!p[id])p[id]={};p[id].lastPct=pct;if(!p[id].h)p[id].h=[];p[id].h.push({pct,ts:Date.now()});setP(p);updateOverall();}
function updateOverall(){const p=getP();const pcts=TOPICS.map(t=>p[t.id]?.lastPct).filter(x=>x!==undefined);const el=document.getElementById("overall-pct");const bar=document.getElementById("overall-bar");const sub=document.getElementById("overall-sub");if(!pcts.length){el.textContent="—";bar.style.width="0%";sub.textContent="Rozwiąż quiz w dowolnym temacie";return;}const avg=Math.round(pcts.reduce((a,b)=>a+b,0)/pcts.length);el.textContent=avg+"%";bar.style.width=avg+"%";sub.textContent=`Średnia: ${avg}% · Quizów: ${pcts.length}/${TOPICS.length}`;}
function esc(s){return s.replace(/'/g,"&#39;").replace(/"/g,"&quot;")}
function prepQuiz(t){const pool=shuffleArr(t.quiz).slice(0,5);return pool.map(q=>{const opts=[...q.opts];const correct=opts[q.ans];shuffleArr(opts);for(let i=opts.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[opts[i],opts[j]]=[opts[j],opts[i]];}const ci=opts.indexOf(correct);return{q:q.q,opts,ci,fb:q.fb};});}
function getState(id){if(!quizState[id]){const t=TOPICS.find(x=>x.id===id);quizState[id]={qs:prepQuiz(t),ans:{}};}return quizState[id];}
function buildQuiz(t){const state=getState(t.id);let h=`<div class="quiz-area"><div class="quiz-title">🎯 Quiz — ${t.title}</div>`;state.qs.forEach((q,qi)=>{h+=`<div class="q-card"><div class="q-text">${qi+1}. ${q.q}</div><div class="q-opts">`;q.opts.forEach((o,oi)=>{h+=`<button class="q-opt" id="qo-${t.id}-${qi}-${oi}" onclick="doAnswer('${t.id}',${qi},${oi})">${o}</button>`;});h+=`</div><div class="q-feedback" id="qf-${t.id}-${qi}"></div></div>`;});h+=`<div class="quiz-score" id="qs-${t.id}"></div><div class="quiz-controls"><button class="q-btn primary" onclick="checkScore('${t.id}')">Sprawdź wynik</button><button class="q-btn" onclick="resetQ('${t.id}')">↺ Nowe pytania</button></div></div>`;return h;}
function doAnswer(id,qi,oi){const state=getState(id);if(state.ans[qi]!==undefined)return;state.ans[qi]=oi;const q=state.qs[qi];const n=q.opts.length;for(let i=0;i<n;i++){const b=document.getElementById(`qo-${id}-${qi}-${i}`);if(b)b.classList.add("disabled");}const ch=document.getElementById(`qo-${id}-${qi}-${oi}`);const co=document.getElementById(`qo-${id}-${qi}-${q.ci}`);if(ch)ch.classList.add(oi===q.ci?"correct":"wrong");if(co&&oi!==q.ci)co.classList.add("correct");const fb=document.getElementById(`qf-${id}-${qi}`);if(fb){fb.textContent=q.fb;fb.classList.add("show",oi===q.ci?"ok":"bad");}}
function checkScore(id){const state=getState(id);const total=state.qs.length;if(Object.keys(state.ans).length<total){alert("Odpowiedz na wszystkie pytania!");return;}let c=0;state.qs.forEach((q,qi)=>{if(state.ans[qi]===q.ci)c++;});const pct=Math.round(c/total*100);const el=document.getElementById("qs-"+id);if(el){el.textContent=(pct>=80?"🎉":pct>=60?"👍":"📚")+` Wynik: ${c}/${total} (${pct}%)`;el.classList.add("show");}saveResult(id,pct);}
function resetQ(id){delete quizState[id];const t=TOPICS.find(x=>x.id===id);const sec=document.getElementById("sec-"+id);if(!sec)return;const body=sec.querySelector(".section-body");if(!body)return;body.innerHTML=t.note+buildQuiz(t);}
function buildNav(){const g=document.getElementById("nav-grid");TOPICS.forEach((t,i)=>{const b=document.createElement("button");b.className="nav-btn";b.style.animationDelay=(i*.04)+"s";b.innerHTML=`<div class="nb">${t.num}</div><div class="nt">${t.emoji} ${t.title}</div>`;b.onclick=()=>{const s=document.getElementById("sec-"+t.id);if(s){s.classList.add("open");s.scrollIntoView({behavior:"smooth",block:"start"});}};g.appendChild(b);});}
function buildSections(){const c=document.getElementById("sections-container");TOPICS.forEach((t,i)=>{const sec=document.createElement("div");sec.className="section";sec.id="sec-"+t.id;sec.style.animationDelay=(i*.06)+"s";const head=document.createElement("div");head.className="section-head";head.innerHTML=`<div class="sh-num">${t.num}</div><div class="sh-info"><div class="sh-title">${t.emoji} ${t.title}</div><div class="sh-sub">${t.sub}</div></div><div class="sh-arrow">▶</div>`;head.onclick=()=>sec.classList.toggle("open");const body=document.createElement("div");body.className="section-body";body.innerHTML=t.note+buildQuiz(t);sec.appendChild(head);sec.appendChild(body);c.appendChild(sec);});}
buildNav();buildSections();updateOverall();
</script>
